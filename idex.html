<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inferno Rivals | Official</title>
    <style>
        :root {
            --primary-red: #d32f2f;
            --dark-bg: #0a0a0a;
            --text-white: #ffffff;
            --accent-glow: rgba(211, 47, 47, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100-vh;
            overflow-x: hidden;
        }

        /* Background Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #2a0a0a 0%, #0a0a0a 100%);
            z-index: -1;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
            width: 100%;
        }

        .logo {
            max-width: 280px;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px var(--accent-glow));
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 20px;
            border: 2px solid var(--primary-red);
            border-radius: 8px;
            transition: all 0.3s ease;
            background: rgba(211, 47, 47, 0.1);
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        /* Button Hover Effects */
        .btn:hover {
            background: var(--primary-red);
            box-shadow: 0 0 25px var(--primary-red);
            transform: translateY(-3px);
        }

        /* Specific Brand Colors on Hover (Optional) */
        .discord:hover { background-color: #5865F2; border-color: #5865F2; box-shadow: 0 0 25px #5865F2; }
        .youtube:hover { background-color: #FF0000; border-color: #FF0000; box-shadow: 0 0 25px #FF0000; }
        .instagram:hover { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); border-color: #dc2743; }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Inferno Rivals Logo" class="logo">
        
        <div class="button-stack">
            <a href="#" target="_blank" class="btn discord">Join Discord</a>
            <a href="#" target="_blank" class="btn youtube">Watch YouTube</a>
            <a href="#" target="_blank" class="btn instagram">Follow Instagram</a>
        </div>

        <footer>
            &copy; 2026 INFERNO RIVALS OFFICIAL
        </footer>
    </div>

</body>
</html>
